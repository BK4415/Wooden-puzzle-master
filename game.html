<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Wooden Puzzle Master - Play</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/game.css">
</head>
<body class="game-view">
    <header class="top-bar">
        <button onclick="location.href='index.html'" class="icon-btn">✕</button>
        <div class="brand">Puzzle Master</div>
        <button id="btn-pause" class="icon-btn">Ⅱ</button>
    </header>

    <div class="game-stats">
        <div class="stat-box"><span>Time</span><strong id="timer">00:00</strong></div>
        <div class="stat-box"><span>Moves</span><strong id="moves">0</strong></div>
        <button id="btn-restart" class="restart-btn">🔄</button>
    </div>

    <div id="puzzle-container">
        <!-- Puzzle Board generated by JS -->
    </div>

    <div class="game-footer">
        <h3 id="display-mode-name">Classic</h3>
        <p id="display-board-size">4×4</p>
    </div>

    <!-- Victory Popup -->
    <div id="victory-overlay" class="overlay hidden">
        <div class="victory-card">
            <img src="assets/trophy.png" alt="Trophy" class="trophy-img">
            <h2>Excellent!</h2>
            <div id="star-rating" class="stars">⭐⭐⭐⭐⭐</div>
            <div class="final-stats">
                <p>Time: <span id="final-time"></span></p>
                <p>Moves: <span id="final-moves"></span></p>
            </div>
            <div class="victory-actions">
                <button onclick="location.reload()" class="premium-btn">Play Again</button>
                <button onclick="location.href='index.html'" class="premium-btn secondary">Menu</button>
                <button id="btn-share" class="premium-btn share">Share</button>
            </div>
        </div>
    </div>

    <script src="js/storage.js"></script>
    <script src="js/puzzle.js"></script>
    <script src="js/swipe.js"></script>
    <script src="js/ui.js"></script>
    <script>
        // Game-specific initialization
        window.addEventListener('load', () => UI.initGame());
    </script>
</body>
</html>
